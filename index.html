<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card RTS - 原型</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #fff; font-family: 'Arial', sans-serif; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        #game-canvas { width: 100%; height: 100%; background: #16213e; }

        #ui-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%;
            pointer-events: none;
        }
        #ui-overlay > * { pointer-events: auto; }

        #bottom-bar {
            display: flex; justify-content: center; gap: 12px;
            padding: 16px; background: rgba(0,0,0,0.85);
            border-top: 2px solid #333;
        }
        .btn {
            padding: 10px 24px; border: none; border-radius: 6px;
            font-size: 15px; font-weight: bold; cursor: pointer;
            transition: all 0.15s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-play { background: #2ecc71; color: #fff; }
        .btn-play:hover { background: #27ae60; }
        .btn-play:disabled { background: #555; cursor: not-allowed; }
        .btn-pass { background: #e67e22; color: #fff; }
        .btn-pass:hover { background: #d35400; }
        .btn-pass:disabled { background: #555; cursor: not-allowed; }
        .btn-unit { background: #3498db; color: #fff; }
        .btn-unit:hover { background: #2980b9; }
        .btn-repair { background: #9b59b6; color: #fff; }
        .btn-repair:hover { background: #8e44ad; }

        #turn-banner {
            position: absolute; top: 0; left: 0; width: 100%;
            text-align: center; padding: 12px;
            font-size: 22px; font-weight: bold;
            background: rgba(0,0,0,0.7);
            pointer-events: none;
        }
        #turn-banner .timer { font-size: 14px; color: #aaa; margin-left: 12px; }

        #status-bar {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 30px;
            background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 6px;
            pointer-events: none; font-size: 14px;
        }

        #last-play-bar {
            position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 6px;
            pointer-events: none; font-size: 16px;
            color: #e94560;
        }

        #instructions {
            position: absolute; top: 140px; right: 15px;
            background: rgba(0,0,0,0.7); padding: 12px; border-radius: 8px;
            font-size: 12px; line-height: 1.8; max-width: 220px;
            pointer-events: none;
        }
        #instructions h4 { color: #e94560; margin-bottom: 6px; }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 24px;
            z-index: 100;
        }
        #start-screen h1 { font-size: 72px; color: #e94560; }
        #start-screen p { font-size: 18px; color: #aaa; }
        .btn-large { font-size: 22px; padding: 16px 36px; }
        .btn-start { background: #e94560; color: #fff; }
        .btn-ai { background: #3498db; color: #fff; }

        #msg-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            font-size: 36px; font-weight: bold; color: #2ecc71;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }
        #msg-overlay.show { opacity: 1; }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="game-canvas"></canvas>

    <!-- 回合信息 -->
    <div id="turn-banner">
        <span id="turn-text">玩家 1 的回合</span>
        <span class="timer" id="turn-timer">30s</span>
    </div>

    <!-- 状态栏 -->
    <div id="status-bar">
        <span>玩家1 补给: <b id="p1-supply">0</b> | 手牌: <b id="p1-cards">10</b></span>
        <span>玩家2 补给: <b id="p2-supply">0</b> | 手牌: <b id="p2-cards">10</b></span>
    </div>

    <!-- 上一手信息 -->
    <div id="last-play-bar">
        <span id="last-play">新一轮，任意出牌</span>
    </div>

    <!-- 操作提示 -->
    <div id="instructions">
        <h4>四幺四扑克规则</h4>
        • 点手牌选中，点出牌按钮打出<br>
        • 可出：单张/对子/三条/顺子/炸弹<br>
        • 必须比上家大，或选择不要<br>
        • 所有人不要则新一轮<br>
        • 先出完手牌者获胜<br>
        <br>
        <h4>RTS操作</h4>
        • 左键拖拽框选单位<br>
        • 右键敌方牌：指挥攻击<br>
        • 右键空地：移动单位
    </div>

    <!-- 底部操作栏 -->
    <div id="ui-overlay">
        <div id="bottom-bar">
            <button class="btn btn-play" id="btn-play" onclick="Game.playSelectedCards()" disabled>
                ♠ 出牌
            </button>
            <button class="btn btn-pass" id="btn-pass" onclick="Game.passTurn()">
                ✋ 不要
            </button>
            <button class="btn btn-unit" id="btn-infantry" onclick="Game.spawnUnit('infantry')">
                🎯 步兵 (100)
            </button>
            <button class="btn btn-repair" id="btn-repair" onclick="Game.startRepair()">
                🔧 维修
            </button>
        </div>
    </div>

    <!-- 消息提示 -->
    <div id="msg-overlay"></div>

    <!-- 开始界面 -->
    <div id="start-screen">
        <h1>Card RTS</h1>
        <p>四幺四扑克 × 实时策略</p>
        <div style="display:flex; gap:20px; margin-top:10px;">
            <button class="btn btn-large btn-start" onclick="Game.start()">🎮 本地对战</button>
            <button class="btn btn-large btn-ai" onclick="Game.startAI()">🤖 单人 vs AI</button>
        </div>
    </div>
</div>

<script src="src/utils/constants.js"></script>
<script src="src/utils/helpers.js"></script>
<script src="src/utils/PokerRules.js"></script>
<script src="src/core/Card.js"></script>
<script src="src/core/Player.js"></script>
<script src="src/core/Unit.js"></script>
<script src="src/systems/EconomySystem.js"></script>
<script src="src/systems/CombatSystem.js"></script>
<script src="src/systems/RepairSystem.js"></script>
<script src="src/ui/Renderer.js"></script>
<script src="src/ui/InputHandler.js"></script>
<script src="src/core/Game.js"></script>
<script>
    window.onload = () => { Game.init(); };
</script>
</body>
</html>

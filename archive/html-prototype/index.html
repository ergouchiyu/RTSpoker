<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card RTS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #fff; font-family: Arial, sans-serif; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        #game-canvas { width: 100%; height: 100%; background: #16213e; }

        /* 底部操作栏 - 绝对定位，不挡牌 */
        #bottom-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 10px;
            padding: 10px; background: rgba(0,0,0,0.9);
            z-index: 10;
        }
        .btn {
            padding: 8px 18px; border: none; border-radius: 4px;
            font-size: 13px; font-weight: bold; cursor: pointer;
        }
        .btn:active { transform: scale(0.95); }
        .btn-play { background: #2ecc71; color: #fff; }
        .btn-play:disabled { background: #555; cursor: not-allowed; }
        .btn-pass { background: #e67e22; color: #fff; }
        .btn-pass:disabled { background: #555; cursor: not-allowed; }
        .btn-unit { background: #3498db; color: #fff; }
        .btn-repair { background: #9b59b6; color: #fff; }

        /* 顶部信息 - 最小化 */
        #top-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 20px;
            padding: 6px; background: rgba(0,0,0,0.8);
            font-size: 12px; z-index: 10;
        }

        /* 消息 */
        #msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            font-size: 28px; font-weight: bold; color: #2ecc71;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 20;
        }
        #msg.show { opacity: 1; }

        /* 开始界面 */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 20px; z-index: 100;
        }
        #start-screen h1 { font-size: 60px; color: #e94560; }
        #start-screen p { font-size: 16px; color: #aaa; }
        .btn-large { font-size: 18px; padding: 12px 28px; }
        .btn-start { background: #e94560; color: #fff; }
        .btn-ai { background: #3498db; color: #fff; }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="game-canvas"></canvas>

    <div id="top-bar">
        <span id="turn-info">玩家1 回合</span>
        <span id="timer">30s</span>
        <span>P1 补给:<b id="p1-s">0</b> 牌:<b id="p1-c">10</b></span>
        <span>P2 补给:<b id="p2-s">0</b> 牌:<b id="p2-c">10</b></span>
        <span id="last-play" style="color:#e94560">新一轮</span>
    </div>

    <div id="bottom-bar">
        <button class="btn btn-play" id="btn-play" onclick="Game.playSelectedCards()" disabled>♠ 出牌</button>
        <button class="btn btn-pass" id="btn-pass" onclick="Game.passTurn()">✋ 不要</button>
        <button class="btn btn-unit" onclick="Game.spawnUnit('infantry')">🎯 步兵 80</button>
        <button class="btn btn-repair" onclick="Game.startRepair()">🔧 维修</button>
    </div>

    <div id="msg"></div>

    <div id="start-screen">
        <h1>Card RTS</h1>
        <p>四幺四扑克 × 实时策略</p>
        <div style="display:flex;gap:15px">
            <button class="btn btn-large btn-start" onclick="Game.start()">🎮 本地对战</button>
            <button class="btn btn-large btn-ai" onclick="Game.startAI()">🤖 vs AI</button>
        </div>
    </div>
</div>

<script src="src/utils/constants.js"></script>
<script src="src/utils/helpers.js"></script>
<script src="src/utils/PokerRules.js"></script>
<script src="src/core/Card.js"></script>
<script src="src/core/Player.js"></script>
<script src="src/core/Unit.js"></script>
<script src="src/systems/EconomySystem.js"></script>
<script src="src/systems/CombatSystem.js"></script>
<script src="src/systems/RepairSystem.js"></script>
<script src="src/ui/Renderer.js"></script>
<script src="src/ui/InputHandler.js"></script>
<script src="src/core/Game.js"></script>
<script>window.onload = () => Game.init();</script>
</body>
</html>
